<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #controls { position: absolute; top: 10px; left: 10px; }
    </style>
</head>
<body>
    <div id="controls">
        <button id="headlights">Toggle Headlights</button>
        <button id="roofLights">Toggle Roof Lights</button>
        <button id="wipers">Toggle Wipers</button>
        <button id="winch">Toggle Winch</button>
        <button id="net">Toggle Net</button>
        <button id="roof">Toggle Roof</button>
        <button id="regen">Toggle Regen</button>
        <button id="cockpit">Toggle Cockpit</button>
        <br>
        <label for="steering">Steering: </label>
        <input type="range" id="steering" min="-1" max="1" step="0.01" value="0">
        <label for="suspension">Suspension: </label>
        <input type="range" id="suspension" min="0" max="1" step="0.01" value="0.5">
        <label for="throttle">Throttle: </label>
        <input type="range" id="throttle" min="0" max="1" step="0.01" value="0">
        <label for="regenSlider">Regen: </label>
        <input type="range" id="regenSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
    <script src="https://threejs.org/build/three.js"></script>
    <script>
        let scene, camera, renderer;
        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Mouse and Wheel interactions
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('wheel', onMouseWheel);

            // Create 3D objects here...
            // e.g., addSphere();

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function onMouseMove(event) {
            // Handle mouse move events for rotation
        }

        function onMouseWheel(event) {
            // Handle mouse wheel events for zoom
        }

        // Add event listeners for controls
        document.getElementById('headlights').addEventListener('click', toggleHeadlights);
        // ... other toggle functions
        document.getElementById('steering').addEventListener('input', updateSteering);
        // ... other slider functions

        function toggleHeadlights() {
            // Implementation of headlights toggle
        }

        function updateSteering() {
            // Implementation of steering update based on slider
        }
        // Add corresponding functions to control each 3D object
    </script>
</body>
</html>
